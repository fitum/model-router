routing:
  # Complexity score thresholds for model selection
  opus_threshold: 0.72      # score >= this -> Opus
  sonnet_threshold: 0.38    # score >= this -> Sonnet, else Haiku

  # Decompose task when estimated_tokens exceeds this fraction of context window
  decompose_threshold: 0.75

  # Token optimization: compress prompt if estimated tokens exceed this
  compress_threshold: 6000

  # In-memory result cache TTL in seconds
  cache_ttl_seconds: 300

token_estimation:
  # Characters per token (approximate)
  prose_chars_per_token: 3.8
  code_chars_per_token: 2.5
  # Overhead factor for system prompt + response preamble
  overhead_factor: 1.2
