site_name: Model Router
site_description: Intelligent AI model routing, orchestration, and cost tracking for Claude
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - API Reference: api/index.md
  - Guides:
    - Getting Started: guides/getting-started.md
    - Usage: guides/usage.md
    - Troubleshooting: guides/troubleshooting.md
